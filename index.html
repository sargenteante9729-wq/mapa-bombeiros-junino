<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Festejos - Rotas Operacionais</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />

    <style>
        body { margin: 0; padding: 0; display: flex; height: 100vh; font-family: Arial, sans-serif; }
        #menu-lateral { width: 320px; background: #fff; box-shadow: 2px 0 5px rgba(0,0,0,0.1); z-index: 1000; display: flex; flex-direction: column; }
        #menu-lateral h2 { background-color: #d32f2f; color: white; margin: 0; padding: 15px; text-align: center; font-size: 1.1rem; }
        ul#lista-cidades { list-style: none; padding: 0; margin: 0; overflow-y: auto; flex-grow: 1; }
        ul#lista-cidades li { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; font-weight: bold; }
        ul#lista-cidades li:hover { background: #ffebee; color: #d32f2f; }
        #mapa { flex-grow: 1; height: 100%; }
        .leaflet-routing-container { display: none; } /* Esconde o painel de texto da rota */
    </style>
</head>
<body>

    <div id="menu-lateral">
        <h2>Municípios e Rotas</h2>
        <ul id="lista-cidades"></ul>
    </div>
    <div id="mapa"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
        const URL_PLANILHA = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRRv-CBDj8UMUo32h5_wkViXlTX72qRCoKOOM3gKxvpT3XAcYwd_ZemvShx87VPRUNU1B4PTZZkVn0P/pub?output=csv';
        const mapa = L.map('mapa').setView([-10.7, -37.4], 9);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapa);

        let controleRota;
        const ARACAJU = L.latLng(-10.9472, -37.0731);

        function desenharRota(lat, lon) {
            if (controleRota) mapa.removeControl(controleRota);
            
            controleRota = L.Routing.control({
                waypoints: [ARACAJU, L.latLng(lat, lon)],
                lineOptions: { styles: [{ color: '#d32f2f', weight: 6, opacity: 0.8 }] },
                createMarker: function() { return null; },
                addWaypoints: false,
                draggableWaypoints: false
            }).addTo(mapa);
        }

        Papa.parse(URL_PLANILHA, {
            download: true, header: true,
            complete: function(res) {
                res.data.forEach(cidade => {
                    if (!cidade.lat || !cidade.lon) return;

                    const marcador = L.marker([cidade.lat, cidade.lon]).addTo(mapa)
                        .bindPopup(`<b>${cidade.nome}</b>`);

                    const item = document.createElement('li');
                    item.textContent = cidade.nome;
                    item.onclick = () => {
                        mapa.flyTo([cidade.lat, cidade.lon], 11);
                        desenharRota(cidade.lat, cidade.lon);
                        marcador.openPopup();
                    };
                    document.getElementById('lista-cidades').appendChild(item);
                });
            }
        });
    </script>
</body>
</html>
